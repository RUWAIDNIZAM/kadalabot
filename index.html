<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkadala Hub | ver2_a</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { 
            --bg: #0c0805;
            --surface: rgba(30, 20, 15, 0.85); 
            --accent: #d2a679;
            --border: rgba(210, 166, 121, 0.15); 
            --text-sec: #b09987;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background: var(--bg); color:white; min-height:100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- BACKGROUND & SPLASH --- */
        .blurry-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(100px); }
        .blob { position: absolute; width: 50vw; height: 50vw; border-radius: 50%; opacity: 0.1; animation: move 20s infinite alternate; }
        .blob-1 { background: var(--accent); top: -10%; left: -10%; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(15%, 15%); } }

        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }

        /* --- NAVIGATION & MENU --- */
        nav { 
            width: 92%; max-width: 1100px; background: var(--surface); backdrop-filter: blur(25px); 
            border: 1px solid var(--border); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; border-radius: 100px;
        }

        .menu-btn { cursor: pointer; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn span { width: 25px; height: 2px; background: var(--accent); border-radius: 2px; transition: var(--transition); }

        /* --- SIDEBAR MENU --- */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: var(--bg); border-right: 1px solid var(--border);
            z-index: 2000; padding: 100px 30px; transition: var(--transition);
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sidebar.open { left: 0; }
        .menu-item { 
            padding: 15px 20px; font-size: 1.1rem; color: var(--text-sec); 
            cursor: pointer; margin-bottom: 10px; border-radius: 15px; transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active { background: var(--surface); color: var(--accent); }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 1500; display: none; opacity: 0; transition: 0.4s;
        }

        /* --- CONTENT SECTIONS --- */
        .main-container { padding: 120px 5% 40px; flex-grow: 1; overflow-y: auto; }
        .section { display: none; opacity: 0; transform: translateY(20px); transition: var(--transition); }
        .section.active { display: grid; opacity: 1; transform: translateY(0); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 32px; padding: 25px; margin-bottom: 25px; }
        .item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 20px; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }

        footer { padding: 30px; text-align: center; font-size: 0.75rem; color: var(--text-sec); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="blurry-bg"><div class="blob blob-1"></div></div>

    <div id="splash"><b>POWERED BY RUWAIDCOOL SOFTWARE</b></div>

    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <h2 style="color: var(--accent); margin-bottom: 30px; letter-spacing: 2px;">MENU</h2>
        <div class="menu-item active" onclick="showSection('dash')">🏠 Dashboard</div>
        <div class="menu-item" onclick="showSection('yappers')">🏆 Rankings</div>
        <div class="menu-item" onclick="showSection('sys')">⚙️ System</div>
        <p style="position: absolute; bottom: 30px; font-size: 0.7rem; opacity: 0.4;">v22.0 ESPRESSO</p>
    </div>

    <nav>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <b style="color: var(--accent);">VERKADALA HUB</b>
        <div style="color: #22c55e; font-size: 0.7rem; font-weight: 900;">LIVE ●</div>
    </nav>

    <div class="main-container">
        <div id="section-dash" class="section active" style="grid-template-columns: 1fr; gap: 20px;">
            <div class="card" style="text-align:center">
                <p style="opacity:0.6; font-size:0.65rem; text-transform:uppercase;">Kadala Strength</p>
                <h1 id="total-mem" style="font-size:5rem; color:var(--accent); letter-spacing: -4px;">0</h1>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><h4>ONLINE</h4><div id="on-list" style="margin-top:15px;"></div></div>
                <div class="card"><h4>SLEEPING</h4><div id="afk-list" style="margin-top:15px;"></div></div>
            </div>
        </div>

        <div id="section-yappers" class="section" style="grid-template-columns: 1fr; gap: 20px;">
            <div class="card">
                <b style="color: var(--accent);">🏆 TOP YAPPER RANKINGS</b>
                <div id="lb-list" style="margin-top:20px;"></div>
            </div>
            <div class="card">
                <b style="color: var(--accent);">🔢 COUNTING KINGS</b>
                <div id="count-lb" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="section-sys" class="section" style="grid-template-columns: 1fr;">
            <div class="card">
                <h4 style="color: var(--accent); margin-bottom: 15px;">SYSTEM STATUS</h4>
                <div class="item"><div><b>Ping</b><br><small id="ping">0ms</small></div></div>
                <div class="item"><div><b>Uptime</b><br><small id="uptime">0m</small></div></div>
                <div class="item"><div><b>Server</b><br><small>Railway.app</small></div></div>
            </div>
        </div>
    </div>

    <footer>CRAFTED W LOVE BY <b>RUWAIDCOOL</b></footer>

    <script>
        // Splash logic
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 1500);

        // Menu Logic
        function toggleMenu() {
            const side = document.getElementById('sidebar');
            const over = document.getElementById('overlay');
            const isOpen = side.classList.contains('open');

            if (isOpen) {
                side.classList.remove('open');
                over.style.opacity = '0';
                setTimeout(() => over.style.display = 'none', 400);
            } else {
                over.style.display = 'block';
                setTimeout(() => { over.style.opacity = '1'; side.classList.add('open'); }, 10);
            }
        }

        // Section Transition Logic
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => { s.classList.remove('active'); });
            document.querySelectorAll('.menu-item').forEach(m => { m.classList.remove('active'); });

            const target = document.getElementById('section-' + id);
            target.classList.add('active');
            
            // Highlight menu item
            event.currentTarget.classList.add('active');
            
            // Close menu after click
            toggleMenu();
        }

        function render(data) {
            if(!data || !data.yappers) return;
            document.getElementById('total-mem').innerText = data.totalMembers || 0;
            document.getElementById('ping').innerText = data.system?.ping || '0ms';
            document.getElementById('uptime').innerText = data.system?.uptime || '0m';
            
            document.getElementById('lb-list').innerHTML = data.yappers.map(u => `<div class="item"><img src="${u.avatar}" class="pfp"><div><b>${u.username}</b><br><small>${u.count} messages</small></div></div>`).join('');
            document.getElementById('count-lb').innerHTML = (data.counters || []).map(u => `<div class="item"><img src="${u.avatar}" class="pfp"><div><b>${u.username}</b><br><small>${u.points} points</small></div></div>`).join('') || '<p style="opacity:0.5; font-size:0.7rem;">Start counting!</p>';
            document.getElementById('on-list').innerHTML = (data.online?.members || []).slice(0, 5).map(m => `<div class="item" style="background:none; padding:5px;"><img src="${m.avatar}" style="width:25px; border-radius:50%; border:1px solid var(--accent);"> <span style="font-size:0.8rem;">${m.username}</span></div>`).join('') || 'None';
            document.getElementById('afk-list').innerHTML = (data.afk || []).map(u => `<div class="item" style="border-left:3px solid #fbbf24;"><div><b>${u.username}</b><br><small>"${u.reason}"</small></div></div>`).join('') || 'None';
        }

        async function fetchAll() {
            try {
                const res = await fetch('/api/all');
                const data = await res.json();
                if (data.totalMembers) { localStorage.setItem('kadala_cache', JSON.stringify(data)); render(data); }
            } catch(e) { console.log("Brewing..."); }
        }

        const cached = localStorage.getItem('kadala_cache');
        if (cached) render(JSON.parse(cached));
        fetchAll();
        setInterval(fetchAll, 30000);
    </script>
</body>
</html>
