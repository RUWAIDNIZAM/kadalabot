<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verkadala Stop | ver2_a</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.45); 
            --accent: #38bdf8; 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- SPLASH SCREEN (2s) --- */
        #splash { position: fixed; inset: 0; background: #020617; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.8s; text-align: center; }
        .splash-text { letter-spacing: 5px; font-weight: 800; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- LIQUID BACKGROUND --- */
        .blurry-bg { position: fixed; inset: 0; z-index: -1; filter: blur(80px); }
        .blob { position: absolute; width: 80vw; height: 80vw; background: var(--accent); border-radius: 50%; opacity: 0.1; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%,-10%); } to { transform: translate(15%,15%); } }

        /* --- NAVIGATION --- */
        nav { 
            width: 94%; max-width: 800px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); 
            padding: 12px 20px; position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; border-radius: 100px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .join-btn { background: var(--accent); color: #020617; padding: 8px 16px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.7rem; }

        /* --- LAYOUT --- */
        .main { padding: 100px 4% 40px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 20px; }
        
        /* Stats */
        .stat-val { font-size: 3.5rem; font-weight: 800; color: var(--accent); letter-spacing: -3px; }

        /* Tabs (Mobile Friendly) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 50px; color: white; cursor: pointer; white-space: nowrap; font-size: 0.75rem; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: #020617; font-weight: 800; }
        .section { display: none; }
        .section.active { display: block; }

        /* Feed Items */
        .item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 10px; }
        .pfp { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--accent); }

        footer { text-align: center; padding: 30px; font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="splash"><div class="splash-text">POWERED BY<br>RUWAIDCOOL SOFTWARE</div></div>
    <div class="blurry-bg"><div class="blob"></div></div>

    <nav>
        <b style="color: var(--accent); font-size: 0.9rem; letter-spacing: 1px;">VERKADALA STOP</b>
        <a href="https://discord.com/invite/7C6wX7cFDw" target="_blank" class="join-btn">JOIN SERVER</a>
    </nav>

    <div class="main">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dash', this)">DASHBOARD</button>
            <button class="tab-btn" onclick="switchTab('chat', this)">AT A GLANCE</button>
            <button class="tab-btn" onclick="switchTab('rank', this)">RANKINGS</button>
        </div>

        <div id="dash" class="section active">
            <div class="card" style="text-align:center">
                <p style="opacity:0.6; font-size:0.6rem; text-transform:uppercase;">Total Kadalais</p>
                <h1 id="total-mem" class="stat-val">0</h1>
            </div>
            <div class="card">
                <h4 style="color:var(--accent); margin-bottom:15px; font-size:0.75rem;">🟢 ONLINE KADALAIS</h4>
                <div id="on-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
            </div>
            <div class="card">
                <h4 style="color:#fbbf24; margin-bottom:15px; font-size:0.75rem;">😴 AFK LOGS</h4>
                <div id="afk-list"></div>
            </div>
        </div>

        <div id="chat" class="section">
            <div class="card">
                <h4 style="color:var(--accent); margin-bottom:15px; font-size:0.8rem;">💬 RECENT SERVER YAPPING</h4>
                <div id="chat-feed"></div>
            </div>
        </div>

        <div id="rank" class="section">
            <div class="card">
                <h4>🏆 TOP YAPPER RANKINGS</h4>
                <div id="lb-list" style="margin-top:15px;"></div>
            </div>
            <div class="card">
                <h4>🔢 COUNTING KINGS</h4>
                <div id="count-lb" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <footer>VER2_A | CRAFTED W LOVE BY RUWAIDCOOL | 2026</footer>

    <script>
        // Splash Transition
        setTimeout(() => { 
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => s.style.display = 'none', 800);
        }, 2000);

        function switchTab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function render(data) {
            if(!data) return;

            // Updated Mapping for v24_c
            document.getElementById('total-mem').innerText = data.totalKadalais || 0;
            
            // Online List
            document.getElementById('on-list').innerHTML = (data.onlineKadalais?.members || []).map(m => `
                <div style="background:rgba(255,255,255,0.05); padding:6px 15px; border-radius:50px; border:1px solid var(--border); font-size:0.7rem; font-weight:600;">${m.username}</div>`).join('') || 'None';
            
            // Chat Feed (At a Glance)
            document.getElementById('chat-feed').innerHTML = (data.chat || []).map(m => `
                <div class="item">
                    <img src="${m.avatar}" class="pfp">
                    <div><b>${m.author}</b><br><small style="color:var(--text-sec)">${m.content}</small></div>
                    <span style="margin-left:auto; font-size:0.6rem; opacity:0.3;">${m.time}</span>
                </div>`).join('') || '<p style="text-align:center; opacity:0.5; font-size:0.7rem;">Listening for yappers...</p>';

            // Rankings
            document.getElementById('lb-list').innerHTML = (data.yappers || []).map(u => `<div class="item"><img src="${u.avatar}" class="pfp"><b>${u.username}</b><span style="margin-left:auto; color:var(--accent)">${u.count}</span></div>`).join('');
            document.getElementById('count-lb').innerHTML = (data.counters || []).map(u => `<div class="item"><img src="${u.avatar}" class="pfp"><b>${u.username}</b><span style="margin-left:auto; color:var(--accent)">${u.points} pts</span></div>`).join('') || 'None';
            
            // AFK Logs
            document.getElementById('afk-list').innerHTML = (data.afk || []).map(u => `
                <div class="item" style="border-left:3px solid #fbbf24;">
                    <b>${u.username}</b><span style="margin-left:auto; opacity:0.6; font-size:0.7rem;">"${u.reason}"</span>
                </div>`).join('') || '<p style="text-align:center; opacity:0.4; font-size:0.7rem;">All kadalais awake.</p>';
        }

        async function fetchAll() {
            try {
                const res = await fetch('/api/all');
                const data = await res.json();
                render(data);
            } catch(e) { console.log("Sync error mapla..."); }
        }
        fetchAll(); setInterval(fetchAll, 30000);
    </script>
</body>
</html>
